<!DOCTYPE html>
<html>
<head>
    <title>Baidu Map API Test Tool</title>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no" />
    <style>
        body {
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            margin: 20px;
            background-color: #f0f2f5;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
        }
        button {
            background-color: #2f54eb;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #1d39c4;
        }
        #map-container {
            height: 500px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ebeef5;
            border-radius: 4px;
            background-color: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #909399;
        }
        #status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 4px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
        }
        .error { background-color: #fef0f0; color: #f56c6c; border: 1px solid #fde2e2; }
        .success { background-color: #f0f9eb; color: #67c23a; border: 1px solid #e1f3d8; }
        .info-box {
            background-color: #e6f7ff;
            border: 1px solid #91d5ff;
            padding: 10px;
            margin-top: 10px;
            font-size: 13px;
            color: #003a8c;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Baidu Map API Test Tool</h2>
    
    <div class="input-group">
        <label for="ak">Browser AK (Access Key):</label>
        <input type="text" id="ak" placeholder="Enter your Baidu Map AK here">
    </div>

    <button onclick="loadBaiduMap()">Load Baidu Map</button>

    <div id="status"></div>
    <div id="map-container">Map will be displayed here</div>

    <div class="info-box">
        <strong>Tips:</strong><br>
        1. Please ensure the AK application type is <b>Browser</b>.<br>
        2. If "Referer whitelist" is set, ensure the current address (e.g., localhost or 127.0.0.1) is in the whitelist.<br>
        3. This page uses <b>MapVGL / JavaScript API GL (v1.0)</b> for testing.
    </div>
</div>

<script>
    function showStatus(msg, type) {
        const status = document.getElementById('status');
        status.style.display = 'block';
        status.className = type;
        status.innerHTML = msg;
    }

    // Prefill AK from URL query (?api_key=...) so the Initialization Wizard
    // can hand off the user's input directly to this test page.
    (function prefillFromQuery() {
        try {
            const params = new URLSearchParams(window.location.search);
            const apiKey = params.get('api_key');
            if (apiKey) {
                const akEl = document.getElementById('ak');
                if (akEl) akEl.value = apiKey;
            }
        } catch (e) {}
    })();

    function loadBaiduMap() {
        const ak = document.getElementById('ak').value.trim();
        const mapContainer = document.getElementById('map-container');

        if (!ak) {
            alert('Please enter Baidu Map AK');
            return;
        }

        // Clean up existing content
        mapContainer.innerHTML = 'Loading Baidu Map script...';
        document.getElementById('status').style.display = 'none';

        // Remove old script
        const oldScript = document.getElementById('baidu-script');
        if (oldScript) oldScript.remove();
        
        // Baidu Map global variable cleanup (due to Baidu API design, thorough cleanup is difficult; refresh page if switching AK multiple times)
        
        // Create callback function
        window.onBMapCallback = function() {
            try {
                // Initialize map
                // BMapGL is for latest custom maps and 3D effects
                const map = new BMapGL.Map("map-container");
                const point = new BMapGL.Point(116.404, 39.915); // Beijing Tiananmen
                map.centerAndZoom(point, 12);
                map.enableScrollWheelZoom(true);

                // Add a marker
                const marker = new BMapGL.Marker(point);
                map.addOverlay(marker);

                showStatus("<strong>Success:</strong> Map loaded successfully.", 'success');

            } catch (e) {
                showStatus('Map initialization failed: ' + e.message, 'error');
            }
        };

        // Dynamically load Baidu Map script
        const script = document.createElement('script');
        script.id = 'baidu-script';
        script.type = 'text/javascript';
        script.src = `https://api.map.baidu.com/api?v=1.0&type=webgl&ak=${ak}&callback=onBMapCallback`;
        
        script.onerror = function() {
            showStatus('Script loading failed, please check network or AK.', 'error');
        };

        document.head.appendChild(script);
    }
</script>

</body>
</html>
