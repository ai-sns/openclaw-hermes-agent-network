<!DOCTYPE html>
<html>
<head>
    <title>Proof of Croncept</title>
    <style>
        /* 确保cronDerperSection不换行 */
        .cronDerperSection {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 8px;
            background-color: #f9f9f9;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            white-space: nowrap;
            margin-right: 10px;
        }

        /* 使用flex布局确保cronDerperSections在同一行 */
        .cronDerperSections {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: nowrap; /* 不换行 */
        }

        /* 隐藏cronDerper的样式 */
        #cronDerper {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1001; /* 高于蒙层 */
        }

        /* cronDerper内的输入框样式 */
        #cronDerper input {
            border: none;
            border-bottom: 1px solid #000;
            padding: 5px;
            margin: 5px 0;
        }

        /* cronDerper内的按钮样式 */
        #cronDerper button {
            padding: 10px 20px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            background-color: #5cb85c;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        /* cronDerper内的按钮悬停样式 */
        #cronDerper button:hover {
            background-color: #4cae4c;
        }

        /* 蒙层样式 */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000; /* 低于cronDerper */
        }
    </style>
    <script src="cron.js"></script>
    <script>
        // 函数用于显示或隐藏cronDerper及蒙层
        function toggleCronDerper() {

            const cronDerper = document.getElementById('cronDerper');
            const overlay = document.getElementById('overlay');
            const isDisplayed = cronDerper.style.display === 'block';

            // 切换显示状态
            cronDerper.style.display = isDisplayed ? 'none' : 'block';
            overlay.style.display = isDisplayed ? 'none' : 'block';
        }
    </script>
</head>
<body>
    <!-- 蒙层 -->
    <div id="overlay" onclick="toggleCronDerper()"></div>

    <!-- 显示按钮，点击时展示cronDerper -->
    <button onclick="toggleCronDerper()">Show CronDerper</button>

    <!-- cronDerper div，默认隐藏 -->
    <div id="cronDerper">
        <div class="cronDerperSections">
            <div class="cronDerperSection">
                <span>
                    <select id="cronViewSelection" oninput="derp.populateDiv(this.value);">
                        <option value="MINUTE_INTERVAL" selected="selected">Minute interval</option>
                        <option value="HOUR_INTERVAL">Hour interval</option>
                        <option value="DAILY">Daily</option>
                        <option value="WEEKLY">Weekly</option>
                        <option value="MONTHLY">Monthly</option>
                        <option value="YEARLY">Yearly</option>
                        <option value="ADVANCED">Advanced</option>
                    </select> |
                </span>
                <span id="cronInput"></span>
            </div>
            <div class="cronDerperSection">
                <span>
                    <button onclick="derp.generateOutput();">Generate</button>
                    <input id="cronOutput" />
                </span>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时初始化CronDerper对象
        window.onload = function() {
            window.derp = new CronDerper();
            derp.populateDiv('MINUTE_INTERVAL');
        };
    </script>
</body>
</html>
