// A2A Protocol Buffer Definitions
// Compatible with Google A2A Protocol v0.3
//
// To generate Python code:
// python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. a2a.proto

syntax = "proto3";

package a2a;

option python_generic_services = true;

// ============== Service Definition ==============

service AgentService {
    // Send a task and wait for completion
    rpc SendTask(TaskRequest) returns (TaskResponse);

    // Send a task with streaming updates
    rpc StreamTask(TaskRequest) returns (stream TaskEvent);

    // Get task status
    rpc GetTask(TaskQuery) returns (TaskResponse);

    // Cancel a running task
    rpc CancelTask(TaskQuery) returns (CancelResponse);

    // Bidirectional streaming for interactive sessions
    rpc Chat(stream ChatMessage) returns (stream ChatMessage);

    // Get agent card
    rpc GetAgentCard(AgentCardRequest) returns (AgentCardResponse);
}

// ============== Core Messages ==============

message TaskRequest {
    string id = 1;                          // Task ID
    string session_id = 2;                  // Session ID for context
    repeated Message messages = 3;          // Input messages
    map<string, string> metadata = 4;       // Additional metadata
    repeated string accepted_output_modes = 5;  // Accepted output types
    PushNotificationConfig push_notification = 6; // Webhook config
}

message TaskQuery {
    string id = 1;                          // Task ID
    int32 history_length = 2;               // Max history items to return
}

message TaskResponse {
    string id = 1;                          // Task ID
    string session_id = 2;                  // Session ID
    TaskStatus status = 3;                  // Task status
    repeated Message history = 4;           // Message history
    repeated Artifact artifacts = 5;        // Task artifacts
    map<string, string> metadata = 6;       // Metadata
}

message TaskEvent {
    string event_type = 1;                  // Event type: status, progress, artifact, message, error
    string task_id = 2;                     // Task ID
    TaskStatus status = 3;                  // Current status
    float progress = 4;                     // Progress (0.0 - 1.0)
    Message message = 5;                    // Partial message
    Artifact artifact = 6;                  // Artifact if available
    string error_message = 7;               // Error message if failed
    int64 timestamp = 8;                    // Unix timestamp
}

message CancelResponse {
    string id = 1;                          // Task ID
    bool success = 2;                       // Whether cancellation succeeded
    TaskStatus status = 3;                  // Status after cancellation
}

// ============== Message Types ==============

message Message {
    string role = 1;                        // Role: user, assistant, system
    repeated MessagePart parts = 2;         // Message parts
    int64 timestamp = 3;                    // Unix timestamp
}

message MessagePart {
    string type = 1;                        // Part type: text, inlineData, fileData
    string text = 2;                        // Text content (for type=text)
    string mime_type = 3;                   // MIME type (for data)
    bytes data = 4;                         // Binary data (for inlineData)
    string file_uri = 5;                    // File URI (for fileData)
}

message Artifact {
    string type = 1;                        // Artifact type: file, image, code, etc.
    string name = 2;                        // Artifact name
    string mime_type = 3;                   // MIME type
    bytes data = 4;                         // Binary data
    string uri = 5;                         // URI if stored remotely
    map<string, string> metadata = 6;       // Additional metadata
}

// ============== Status Types ==============

message TaskStatus {
    TaskState state = 1;                    // Current state
    string message = 2;                     // Status message
    int64 timestamp = 3;                    // Unix timestamp
}

enum TaskState {
    TASK_STATE_UNKNOWN = 0;
    TASK_STATE_PENDING = 1;
    TASK_STATE_RUNNING = 2;
    TASK_STATE_COMPLETED = 3;
    TASK_STATE_FAILED = 4;
    TASK_STATE_CANCELLED = 5;
}

// ============== Notification Types ==============

message PushNotificationConfig {
    string url = 1;                         // Webhook URL
    string token = 2;                       // Authentication token
    map<string, string> headers = 3;        // Custom headers
}

// ============== Chat Messages ==============

message ChatMessage {
    string session_id = 1;                  // Session ID
    Message message = 2;                    // Chat message
    bool is_final = 3;                      // Whether this is the final response
    string error = 4;                       // Error message if any
}

// ============== Agent Card ==============

message AgentCardRequest {
    // Empty request - just fetches the agent card
}

message AgentCardResponse {
    string name = 1;                        // Agent name
    string description = 2;                 // Agent description
    string url = 3;                         // Agent URL
    string version = 4;                     // Agent version
    string protocol_version = 5;            // A2A protocol version
    AgentCapabilities capabilities = 6;     // Agent capabilities
    repeated AgentSkill skills = 7;         // Agent skills
    repeated string default_input_modes = 8;  // Default input modes
    repeated string default_output_modes = 9; // Default output modes
    ProviderInfo provider = 10;             // Provider info
}

message AgentCapabilities {
    bool streaming = 1;                     // Supports streaming
    bool push_notifications = 2;            // Supports webhooks
    bool state_transition_history = 3;      // Records state history
}

message AgentSkill {
    string id = 1;                          // Skill ID
    string name = 2;                        // Skill name
    string description = 3;                 // Skill description
    repeated string tags = 4;               // Skill tags
    repeated string examples = 5;           // Example prompts
    repeated string input_modes = 6;        // Supported input modes
    repeated string output_modes = 7;       // Supported output modes
}

message ProviderInfo {
    string organization = 1;                // Organization name
    string url = 2;                         // Organization URL
}
