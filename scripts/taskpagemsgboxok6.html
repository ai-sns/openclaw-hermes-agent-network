        /* Toast 样式 */
        .toast {
            visibility: hidden;
            min-width: 250px;
            margin-left: -125px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 5px;
            padding: 16px;
            position: fixed;
            z-index: 1001;
            left: 50%;
            bottom: 30px;
            font-size: 17px;
            opacity: 0;
            transition: opacity 0.5s, visibility 0.5s;
        }

        .toast.show {
            visibility: visible;
            opacity: 1;
        }



        /* 样式用于工具提示 */
        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            width: 120px; /* 工具提示的宽度 */
            height: 20px;
            background-color: black; /* 工具提示的背景颜色 */
            color: #fff; /* 工具提示的文字颜色 */
            text-align: center; /* 文字居中 */
            border-radius: 5px; /* 圆角 */
            padding: 5px; /* 内边距 */
            position: absolute; /* 绝对定位 */
            z-index: 1; /* 层级 */
            bottom: 125%; /* 工具提示位置 */
            left: 50%;
            top:30px;
            margin-left: -60px; /* 左对齐 */
            opacity: 0; /* 初始透明度 */
            transition: opacity 0.3s; /* 渐变效果 */
        }

        .tooltip:hover .tooltiptext {
            visibility: visible; /* 悬停显示 */
            opacity: 1; /* 变为不透明 */
        }


        /* 创建自定义复选框 */
        .styled-checkbox {
            position: relative;
            display: none;
            padding-left: 30px;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            margin-right: 10px;
        }

        /* 创建复选框的外观 */
        .styled-checkbox:before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 15px;
            height: 15px;
            border: 2px solid #146ebe;
            border-radius: 4px;
            background: #fff;
            transition: background 0.3s;
        }

        /* 创建复选框的选中状态 */
        .styled-checkbox:checked:before {
            background: #146ebe;
            border-color: #146ebe;
        }

        /* 创建复选框的视觉效果 */
        .styled-checkbox:checked:after {
            content: '';
            position: absolute;
            left: 6px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid #fff;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* 悬停状态 */
        .styled-checkbox:hover:before {
            border-color: #0056b3;
        }

        /* 焦点状态 */
        .styled-checkbox:focus:before {
            box-shadow: 0 0 5px #146ebe;
        }

    var api_object = null;

        highlight: function (str, lang) {
            if (lang && hljs.getLanguage(lang)) {

                    return '<pre class="hljs"><span class="code-label">' +
                        lang.toUpperCase() +
                        '</span><button class="copy-button" onclick="toggleMenu(event, this)">操作▼</button><code>' +
                        hljs.highlight(str, {
                            language: lang,
                            ignoreIllegals: true
                        }).value +
                        '</code></pre>';
                } catch (__) {
                }
            }
            return
            '<pre class="hljs"><button class="copy-button" onclick="toggleMenu(event, this)">操作▼</button><code>' + md.utils.escapeHtml(str) + '</code></pre>';
        }
    });

    // 用于切换菜单的显示和隐藏
    function toggleMenu(event, button) {
        // 获取菜单元素
        const menu = document.getElementById('menu');

        // 获取按钮的坐标
        const rect = button.getBoundingClientRect();
        menu.style.top = `${rect.bottom + window.scrollY}px`;
        menu.style.left = `${rect.left + window.scrollX}px`;

        // 设置当前按钮关联的 code 标签
        menu.typeElement = button.previousElementSibling;
        menu.codeElement = button.nextElementSibling;

        // 切换菜单的显示和隐藏
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';

        // 阻止事件冒泡
        event.stopPropagation();
    }

    // 拷贝 code 标签中的内容
    function copyContent(menuItem) {
        // 获取关联的 code 标签
        const code = menuItem.closest('#menu').codeElement;
        const text = code.innerText;

        // 创建一个隐藏的 textarea 元素用于复制
        const textarea = document.createElement('textarea');
        document.body.appendChild(textarea);
        textarea.value = text;
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);

        showToast('内容已拷贝成功了！');
    }

    function copy_code(button) {

                    var codeElement = button.nextElementSibling;
                    var range = document.createRange();
                    range.selectNode(codeElement);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);

                    try {
                        document.execCommand('copy');

                        button.textContent = '已经拷贝';

    function setSelectedHistoryIndex(i, check_status){
        console.log("setSelectedHistoryIndex i:", i);
        console.log("setSelectedHistoryIndex status:", check_status);
        if (check_status === "checked") {
            addSelectedHistoryIndex(i);
        } else {
            removeSelectedHistoryIndex(i);
        }

   function addSelectedHistoryIndex(i){
        // Check if 'i' is already in 'selectedHistoryIndex'
        if (!selectedHistoryIndex.includes(i)) {
            // Insert 'i' into 'selectedHistoryIndex' in sorted order
            selectedHistoryIndex.push(i);
            selectedHistoryIndex.sort((a, b) => a - b);
        }
    }

    function removeSelectedHistoryIndex(i){
        // Remove the first occurrence of 'i' from 'selectedHistoryIndex', if it exists
        const index = selectedHistoryIndex.indexOf(i);
        if (index > -1) {
            selectedHistoryIndex.splice(index, 1);
        }
    }

    // 添加悬浮菜单的显示和隐藏逻辑
    const innermenu = document.getElementById('innermenu');
    let hideMenuTimeout;

    // 鼠标移入时显示菜单
    function handleMouseOver(hoverDiv) {
        clearTimeout(hideMenuTimeout); // 清除隐藏菜单的计时器
        const rect = hoverDiv.getBoundingClientRect();
        innermenu.style.top = `${rect.top + window.scrollY}px`;
        innermenu.style.left = `${rect.right + window.scrollX}px`;
        innermenu.style.display = 'block';
        innermenu.setAttribute('data-value', hoverDiv.getAttribute('data-value')); // 设置菜单的data-value
        innermenu.setAttribute('data-text', hoverDiv.getAttribute('data-text')); // 设置菜单的data-value
        innermenu.setAttribute('data-index', hoverDiv.getAttribute('data-index')); // 设置菜单的data-value
    };

    // 鼠标移出 hoverDiv 时隐藏菜单，除非鼠标移入到菜单上
    function handleMouseLeave(event) {
        hideMenuTimeout = setTimeout(function () {
            if (!innermenu.contains(event.relatedTarget)) {
                innermenu.style.display = 'none';
            }
        }, 200); // 延迟200毫秒隐藏菜单
    };

    // 鼠标移出菜单时隐藏菜单
    innermenu.addEventListener('mouseleave', function () {
        hideMenuTimeout = setTimeout(function () {
            innermenu.style.display = 'none';
        }, 200); // 延迟200毫秒隐藏菜单
    });

    // 鼠标移入菜单时保持菜单显示
    innermenu.addEventListener('mouseover', function () {
        clearTimeout(hideMenuTimeout); // 清除隐藏菜单的计时器
        innermenu.style.display = 'block';
    });
