<!DOCTYPE HTML>
<html>
<head>
<meta charset="UTF-8">

<body>
<div id="chessBox" class="chess_box">
	<canvas id="chess"></canvas>
	<audio src="audio/click.wav" id="clickAudio" preload="auto"></audio>
	<audio src="audio/select.wav" id="selectAudio" preload="auto"></audio>
	<div class="bn_box" id="bnBox">
		<input type="button" name="restartBtn" id="restartBtn" value="  重新开始  " />
		<input type="button" name="gohomeBtn" id="gohomeBtn" value="  返回首页  " />
		<input type="button" name="regretBtn" id="regretBtn" value="  悔   棋  " />
		<input type="button" name="airunBtn" id="airunBtn"
			   value="  AI代下  " onclick="ai_run()" />
	</div>
</div>
<div class="menu_box" id="menuBox">
	<div class="menu_init" id="indexBox"><a id="indexDy">人机对弈</a><a id="indexQj">挑战棋局</a><a id="stypeBtn">更换皮肤</a></div>
	<div class="menu_dy" id="menuDy">
		<div class="menu_info">
			<div class="menu_fh" id="menuFh"></div>
			<label>
				<input name="depth" type="radio" value="2">
				菜鸟水平</label>
			<br />
			<label>
				<input name="depth" type="radio" value="3" checked>
				中级水平</label>
			<br />
			<label>
				<input name="depth" type="radio" value="4">
				高手水平</label>
		</div>
		<a id="playBtn">开始对弈</a>


	</div>
	<div class="menu_qj" id="menuQj">
		<div class="menu_info">
			<div class="menu_fh" id="menuGb"></div>
			<label>
				<input name="clasli" type="radio" value="0" checked>
				八卦阵法</label>
			<br />
			<label>
				<input name="clasli" type="radio" value="1">
				很二棋局</label>
			<br />
			<label>
				<input name="clasli" type="radio" value="2">
				七星会阵</label>
		</div>
		<a id = "clasliBtn">开始挑战</a>



	</div>
</div>
<div>
	<textarea id="content" style="width:1000px;height:300px">hello</textarea>

</div>
<script type="text/javascript" src="js/common.js"></script>
<script type="text/javascript" src="js/play.js"></script>
<script type="text/javascript" src="js/AI.js"></script>
<script type="text/javascript" src="js/Human_AI.js"></script>
<script type="text/javascript" src="js/gambit.js"></script>
<script type="text/javascript" src="js/clasli.js"></script>
<script type="text/javascript" charset="utf-8" src="js/cordova-2.2.0.js"></script>
<script src="js/qwebchannel.js"></script>

<script>
		var api_object = null;
		var player_side = -1;

		function ai_run(){
			// alert('airun');
			send_msg('车9进1(0908)');
		}

        // 发送消息
        function send_msg(msg) {
            // alert(msg);
            // 解析指令 (假设msg格式为 "马8进7(0827)")
            let chess_command = msg.split('(')[0].trim(); // 取出棋步命令
            let point = parse_command(msg);
            if (point) {
                make_move(chess_command, point);
            }
        }

        // 解析指令字符串
        function parse_command(command) {
            var matches = command.match(/\((\d)(\d)(\d)(\d)\)/);
            if (matches) {
                return [[parseInt(matches[1]), parseInt(matches[2])], [parseInt(matches[3]), parseInt(matches[4])]];
            }
            return null;
        }

        // 棋步移动
        function make_move(chess_command, point) {
            // alert("棋谱命令: " + chess_command);
			// alert(point);
			// alert(point[0]);
			// alert(point[1][0]);
			// play.msg_to_move(point);
			// play.msg_to_move2(point);
            // alert("移动点: " + JSON.stringify(point));


			play.UserAutoPlay(1);
			setTimeout(play.AIPlay,500);

			// play.AIPlay();
			// setTimeout(play.UserAutoPlay,500);

			// // play.moveByNotation("车一进2");
        }

		function init_to_play(msg){
			// alert(msg);
			player_side=1;//player_side缺省值为-1，发起方改为1，即为红方
			play.UserAutoPlay(player_side);
		}

		function received_msg(msg){
			// alert("in received_msg");
			// alert(msg.split('').map(Number));
			play.MakePace(msg.split('').map(Number));
			play.UserAutoPlay(player_side);//player_side缺省值为-1，即为黑方
		}

		function send_move(move){
			// alert("in send_move:the move");
			// alert(move);

			api_object.send_message(move.join(''));
			// alert("after send_message move");
		}

		//初始化文档
        document.addEventListener("DOMContentLoaded", function () {
                new QWebChannel(qt.webChannelTransport, function (channel) {
                    api_object = channel.objects.message_handler;
                    api_object.on_message_init.connect(init_to_play);
					api_object.on_message_receive.connect(received_msg);
                });
            });

</script>


</body>
</html>
