<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.map.baidu.com https://*.bdimg.com; style-src 'self' 'unsafe-inline' https://*.bdimg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: http: https: blob:; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https://*.baidu.com https://*.bdimg.com; frame-src 'self' https://*.baidu.com https://* http://localhost:*;">
    <title>AI-SNS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/agent-settings-dialog.css">
    <link rel="stylesheet" href="css/agent-tools-dialog.css">
    <link rel="stylesheet" href="css/tools.css">
    <link rel="stylesheet" href="css/tools-enhanced.css">
</head>
<body>
    <div id="app">
        <!-- 自定义标题栏 -->
        <header class="titlebar" id="titlebar">
            <div class="titlebar-drag-region"></div>
            <!-- macOS 风格窗口按钮 (左侧) -->
            <div class="window-controls macos-style">
                <button class="window-btn close" id="windowClose" title="关闭">
                    <svg viewBox="0 0 12 12"><path d="M3.5 3.5l5 5M8.5 3.5l-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
                <button class="window-btn minimize" id="windowMinimize" title="最小化">
                    <svg viewBox="0 0 12 12"><path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
                <button class="window-btn maximize" id="windowMaximize" title="最大化">
                    <svg viewBox="0 0 12 12"><rect x="2" y="2" width="8" height="8" rx="1" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
                </button>
            </div>
            <div class="titlebar-title">AI-SNS</div>
            <div class="titlebar-actions">
                <button class="titlebar-btn theme-toggle-btn" id="themeToggleBtn" title="切换主题">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
            <div class="titlebar-spacer"></div>
        </header>

        <!-- 主体内容区 -->
        <div class="app-body">
            <!-- 左侧图标导航栏 -->
            <nav class="icon-nav" id="iconNav">
                <div class="nav-logo">
                    <svg viewBox="0 0 32 32" width="28" height="28">
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#4F46E5"/>
                                <stop offset="100%" style="stop-color:#7C3AED"/>
                            </linearGradient>
                        </defs>
                        <circle cx="16" cy="16" r="14" fill="url(#logoGradient)"/>
                        <text x="16" y="21" text-anchor="middle" fill="white" font-size="12" font-weight="bold">AI</text>
                    </svg>
                </div>
                <div class="icon-nav-main">
                    <div class="nav-icon-item active" data-page="sns" title="SNS 社交网络">
                        <div class="nav-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <rect x="3" y="3" width="7" height="7" rx="1"/>
                                <rect x="14" y="3" width="7" height="7" rx="1"/>
                                <rect x="3" y="14" width="7" height="7" rx="1"/>
                                <rect x="14" y="14" width="7" height="7" rx="1"/>
                            </svg>
                        </div>
                        <span class="nav-label">SNS</span>
                    </div>
                    <div class="nav-icon-item" data-page="agent" title="AI Agent">
                        <div class="nav-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
                                <path d="M19 10H5a2 2 0 0 0-2 2v1a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1a2 2 0 0 0-2-2z"/>
                                <path d="M12 15v4"/>
                                <path d="M8 22h8"/>
                            </svg>
                        </div>
                        <span class="nav-label">Agent</span>
                    </div>
                    <div class="nav-icon-item" data-page="km" title="知识库">
                        <div class="nav-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                                <path d="M8 7h8"/>
                                <path d="M8 11h6"/>
                            </svg>
                        </div>
                        <span class="nav-label">KM</span>
                    </div>
                    <div class="nav-icon-item" data-page="tools" title="工具插件">
                        <div class="nav-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                            </svg>
                        </div>
                        <span class="nav-label">Tools</span>
                    </div>
                </div>
                <div class="icon-nav-bottom">
                    <div class="nav-icon-item" data-page="web" title="Web 服务">
                        <div class="nav-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M2 12h20"/>
                                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                            </svg>
                        </div>
                        <span class="nav-label">Web</span>
                    </div>
                    <div class="nav-icon-item" data-page="home" title="首页设置">
                        <div class="nav-icon-wrapper">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                <polyline points="9,22 9,12 15,12 15,22"/>
                            </svg>
                        </div>
                        <span class="nav-label">Home</span>
                    </div>
                </div>
            </nav>

            <!-- 二级侧边栏 -->
            <aside class="secondary-sidebar" id="secondarySidebar">
                <!-- 根据不同页面动态切换内容 -->
            </aside>

            <!-- 侧边栏分隔拖拽条 -->
            <div class="sidebar-resizer" id="sidebarResizer">
                <div class="resizer-handle">
                    <div class="resizer-line"></div>
                </div>
                <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="折叠侧边栏">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5">
                        <polyline points="15,18 9,12 15,6"/>
                    </svg>
                </button>
            </div>

            <!-- 主内容区 -->
            <main class="main-content" id="mainContent">
                <!-- 页面内容由 JS 动态加载 -->
            </main>
        </div>
    </div>

    <!-- 模态框容器 -->
    <div id="modalContainer"></div>

    <!-- 通知容器 -->
    <div id="notificationContainer" class="notification-container"></div>

    <!-- 加载脚本 -->
    <!-- 旧版脚本 (向后兼容，待完全迁移后移除) -->
    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script src="js/tools-manager.js"></script>
    <script src="js/pages.js"></script>

    <!-- 插件系统 -->
    <script type="module" src="js/plugins/mindmapPlugin.js"></script>
    <script type="module" src="js/plugins/codePlugin.js"></script>

    <!-- 新模块系统 (ES6 Modules) -->
    <script type="module" src="js/core/eventBus.js"></script>
    <script type="module" src="js/core/storage.js"></script>
    <script type="module" src="js/core/router.js"></script>
    <script type="module" src="js/shared/components/Modal.js"></script>
    <script type="module" src="js/shared/components/Notification.js"></script>
    <script type="module" src="js/modules/agent/AgentSettingsDialog.js"></script>
    <script type="module" src="js/moduleLoader.js"></script>

    <!-- Agent Tools Configuration -->
    <script src="js/modules/agent/AgentToolsDialog.js"></script>
    <script src="js/modules/agent/agentToolsConfig.js"></script>

    <!-- 主应用入口 (必须最后加载) -->
    <script src="js/app.js"></script>
</body>
</html>
